  /deposit/status:
    get:
      summary: Track the lifecycle of a deposit
      description: >
        Returns the fill status of a deposit along with a corresponding fill transaction hash if filled.
         
        This endpoint loads data queried by an indexing service that polls relevant events on a 10-second cadence. 

        Users should therefore expect an average latency of 1 to 15 seconds after submitting a deposit to see the status changed in this endpoint. 

        This delay comes from the time it takes for the internal indexing to include the deposit transaction.
      parameters:
        - name: originChainId
          in: query
          required: false
          description: >
            Chain Id where the deposit originated from. This must be used in conjunction with depositId. depositTxHash is not required when using this parameter.
          schema:
            allOf:
              - $ref: '#/components/schemas/ChainId'
          examples:
            default:
              value: 137
          x-gitbook-description-html: >-
            <p>Chain Id where the deposit originated from. This must be used in conjunction with depositId. depositTxHash is not required when using this parameter.</p>
        - name: depositId
          in: query
          required: false
          description: >
            The deposit id that is emitted from the FundsDeposited event. This must be used in conjunction with originChainId. depositTxnRef is not required when using this parameter.
          schema:
            type: integer
            minimum: 0
          examples:
            default:
              value: 1349975
          x-gitbook-description-html: >-
            <p>The deposit id that is emitted from the FundsDeposited event. This must be used in conjunction with originChainId. depositTxnRef is not required when using this parameter.</p>
        - name: depositTxnRef
          in: query
          required: true
          description: >
            The deposit transaction hash that is emitted from the FundsDeposited event. If you are using this, you donot need the other parameters (i.e. originChainId and depositId).
          schema:
            type: string
          examples:
            default:
              value: >-
                0x56a86610aad2a653161c9dd4b4972f948198fd02ae9589cfac1d57bd86a156c1
          x-gitbook-description-html: >-
            <p>The deposit transaction hash that is emitted from the FundsDeposited event. If you are using this, you donot need the other parameters (i.e. originChainId and depositId).</p>
      responses:
        '200':
          description: Lifecycle of a Transaction
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - filled
                      - pending
                      - expired
                      - refunded
                      - slowFillRequested
                    description: |
                      The status of the deposit.
                       * filled: Deposits with this status have been filled on the destination chain and the recipient should have received funds. A FilledRelay event was emitted on the destination chain SpokePool.
                       * pending: Deposit has not been filled yet.
                       * expired: Deposit has expired and will not be filled. Expired deposits will be refunded to the `depositor` on the `originChainId` in the next batch of repayments.
                       * refunded: Deposit has expired and the depositor has been successfully refunded on the originChain. 
                       * slowFillRequested: Deposit has been made but no relayer has filled the intent, therefore Across fills the user's intent without requiring a relayer to front the capital.
                    x-gitbook-description-html: >-
                      <p>The status of the deposit.</p>

                      <ul>

                      <li>filled: Deposits with this status have been filled on the destination chain and the recipient should have received funds. A FilledRelay event was emitted on the destination chain SpokePool.</li>

                      <li>pending: Deposit has not been filled yet.</li>

                      <li>expired: Deposit has expired and will not be filled. Expired deposits will be refunded to the <code>depositor</code> on the <code>originChainId</code> in the next batch of repayments.</li>

                      <li>refunded: Deposit has expired and the depositor has been successfully refunded on the originChain.</li>

                      <li>slowFillRequested: Deposit has been made but no relayer has filled the intent, therefore Across fills the user's intent without requiring a relayer to front the capital.</li>

                      </ul>
                  fillTxnRef:
                    type: string
                    description: >
                      The transaction hash of the fill transaction on the destination chain. This field is only present when `status` is `filled`.
                    x-gitbook-description-html: >-
                      <p>The transaction hash of the fill transaction on the destination chain. This field is only present when <code>status</code> is <code>filled</code>.</p>
                  destinationChainId:
                    type: integer
                    description: |
                      The chain id where the fill transaction took place.
                    x-gitbook-description-html: <p>The chain id where the fill transaction took place.</p>
                  originChainId:
                    type: integer
                    description: >
                      The chain id where the deposit transaction originally took place.
                    x-gitbook-description-html: >-
                      <p>The chain id where the deposit transaction originally took place.</p>
                  depositId:
                    type: integer
                    description: |
                      The deposit Id for the deposit transaction.
                    x-gitbook-description-html: <p>The deposit Id for the deposit transaction.</p>
                  depositTxnRef:
                    type: integer
                    description: |
                      The deposit transaction hash.
                    x-gitbook-description-html: <p>The deposit transaction hash.</p>
                  depositRefundTxnRef:
                    type: integer
                    description: |
                      The deposit refund transaction hash.
                    x-gitbook-description-html: <p>The deposit refund transaction hash.</p>
                  actionsSucceeded:
                    type: boolean
                    description: |
                      Defines if the actions succeeded.
                    x-gitbook-description-html: <p>Defines if the actions succeeded.</p>
                  pagination:
                    type: object
                    description: >
                      The pagination object defines the currentIndex and maxIndex of the returned deposits.
                    x-gitbook-description-html: >-
                      <p>The pagination object defines the currentIndex and maxIndex of the returned deposits.</p>
                    properties: {}
                  depositTxHash:
                    type: string
                    description: Deposit transaction hash
                    example: "0x01ef7ad7ed64e273b2a63b22fb75abf42ecd7b65e8deb96c440ec3cd56915a84"
                    x-auto-generated: true
                  fillTx:
                    type: string
                    description: Fill transaction
                    example: "0xa2561456382ad815ed13bd0f0ef3cc6d9d537c10337787baafee2e25e201653f"
                    x-auto-generated: true
                  depositRefundTxHash:
                    nullable: true
                    description: Deposit refund transaction hash
                    x-auto-generated: true
              example:
                status: filled
                originChainId: 8453
                depositId: '4406025'
