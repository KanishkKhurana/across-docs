      x-gitbook-description-html: >-
        <p>Returns data required to execute a crosschain swap. If the input token requires approval, <code>approvalTxns</code> will be included in the response.</p>
    post:
      summary: Build embedded crosschain swap actions with the Swap API
      description: >
        Use the /`swap/approval` API to build embedded crosschain actions (e.g., mint, deposit) that execute on the destination chain immediately after a swap.

        Define an action with its `target`, `functionSignature`, and `value`. For contract calls, provide an `args[]` array where each parameter can be static or dynamically populated with a token balance by setting `populateDynamically: true` and specifying the `balanceSourceToken`.

        In this example we will transfer the entire balance of a newly swapped token, call the ERC20 transfer function with a static recipient address and a dynamic amount argument flagged for population.
      parameters:
        - in: query
          name: tradeType
          required: true
          x-warn-html: >
            when using exactOutput some routes may return more tokens than expected. So if you're using exactOutput with embedded actions, and you need those actions to execute with the exact amount you specify, you should not use dynamic balance, instead, set the values explicitly to the exact amount.
          description: >
            Defines the type of trade execution strategy used in a swap or bridge request.

            Each trade type specifies how input and output token amounts are determined

            and how associated fees are handled. Here are the tradeTypes:

            - <b>exactInput</b>: 
                Use this when you want to bridge or swap a fixed amount of your inputToken. You define the exact quantity of tokens to send, and the system calculates the amount of outputToken you'll receive after all fees are deducted. If your input isn't sufficient to cover the transaction fees, the request will fail.
            - <b>minOutput</b>:
                Use this when you need to receive at least a certain amount of the outputToken. You set the minimum output you're willing to accept, and the system calculates the necessary input amount, including fees and slippage. Due to price slippage, the final amount you receive will be at least your specified minimum but could be slightly more. This is especially useful for simple swaps without subsequent crosschain actions.
            - <b>exactOutput</b>: 
                Use this when you need to receive a precise amount of the destination token. You specify the exact output you require, and the system calculates the total input needed to guarantee that amount. If market conditions prevent the system from delivering that exact amount, the entire transaction is cancelled, and your funds are refunded. This is recommended for multi-step transactions, like providing an exact amount of an ERC20 token to a minting contract.
          schema:
            type: string
            enum:
              - minOutput
              - exactOutput
              - exactInput
            default: exactInput
          x-gitbook-description-html: >-
            <p>Defines the type of trade execution strategy used in a swap or bridge request.

            Each trade type specifies how input and output token amounts are determined

            and how associated fees are handled. Here are the tradeTypes:</p>

            <ul>

            <li>exactInput:

            Use this when you want to bridge or swap a fixed amount of your inputToken. You define the exact quantity of tokens to send, and the system calculates the amount of outputToken you'll receive after all fees are deducted. If your input isn't sufficient to cover the transaction fees, the request will fail.</li>

            <li>minOutput:

            Use this when you need to receive at least a certain amount of the outputToken. You set the minimum output you're willing to accept, and the system calculates the necessary input amount, including fees and slippage. Due to price slippage, the final amount you receive will be at least your specified minimum but could be slightly more. This is especially useful for simple swaps without subsequent crosschain actions.</li>

            <li>exactOutput:

            Use this when you need to receive a precise amount of the destination token. You specify the exact output you require, and the system calculates the total input needed to guarantee that amount. If market conditions prevent the system from delivering that exact amount, the entire transaction is cancelled, and your funds are refunded. This is recommended for multi-step transactions, like providing an exact amount of an ERC20 token to a minting contract.</li>

            </ul>
        - in: query
          name: amount
          required: true
          description: Required amount of output token in smallest unit.
          schema:
            type: string
            example: '1000000'
          x-gitbook-description-html: <p>Required amount of output token in smallest unit.</p>
        - in: query
          name: inputToken
          required: true
          description: Address of the input token on the origin chain.
          schema:
            type: string
            example: '0x0b2C639c533813f4Aa9D7837CAf62653d097Ff85'
          x-gitbook-description-html: <p>Address of the input token on the origin chain.</p>
        - in: query
          name: outputToken
          required: true
          description: Address of the output token on the destination chain.
          schema:
            type: string
            example: '0x82aF49447D8a07e3bd95BD0d56f35241523fBab1'
          x-gitbook-description-html: <p>Address of the output token on the destination chain.</p>
        - in: query
          name: originChainId
          required: true
          description: Chain ID of the origin chain.
          schema:
            type: integer
            example: 10
          x-gitbook-description-html: <p>Chain ID of the origin chain.</p>
        - in: query
          name: destinationChainId
          required: true
          description: Chain ID of the destination chain.
          schema:
            type: integer
            example: 42161
          x-gitbook-description-html: <p>Chain ID of the destination chain.</p>
        - in: query
          name: depositor
          required: true
          description: Address of the depositor initiating the swap.
          schema:
            type: string
            example: '0xA4d353BBc130cbeF1811f27ac70989F9d568CeAB'
          x-gitbook-description-html: <p>Address of the depositor initiating the swap.</p>
        - in: query
          name: recipient
          required: false
          description: >-
            Address of the account receiving the output token. Defaults to `depositor` if not provided.
          schema:
            type: string
            example: '0xA4d353BBc130cbeF1811f27ac70989F9d568CeAB'
          x-gitbook-description-html: >-
            <p>Address of the account receiving the output token. Defaults to <code>depositor</code> if not provided.</p>
        - in: query
          name: appFee
          required: false
          description: >-
            Enables integrators to collect a customizable fee in the output token, sent to a designated address on the destination chain. appFee is expressed in percentage with value ranging between 0 and 1.
          schema:
            type: number
            example: 0.01
          x-gitbook-description-html: >-
            <p>Enables integrators to collect a customizable fee in the output token, sent to a designated address on the destination chain. appFee is expressed in percentage with value ranging between 0 and 1.</p>
        - in: query
          name: appFeeRecipient
          required: false
          description: >-
            Address of the account receiving the app fees. Must be defined if you are also defining `appFee`.
          schema:
            type: string
            example: '0xA4d353BBc130cbeF1811f27ac70989F9d568CeAB'
          x-gitbook-description-html: >-
            <p>Address of the account receiving the app fees. Must be defined if you are also defining <code>appFee</code>.</p>
        - in: query
          name: integratorId
          required: false
          description: 2-byte hex-string that identifies the integrator. E.g., "0xdead".
          schema:
            type: string
            example: '0xdead'
          x-gitbook-description-html: >-
            <p>2-byte hex-string that identifies the integrator. E.g., "0xdead".</p>
        - in: query
          name: refundAddress
          required: false
          description: Address to receive refunds. Defaults to depositor if not provided.
          schema:
            type: string
            default: 0xDEPOSITOR_ADDRESS
          x-gitbook-description-html: >-
            <p>Address to receive refunds. Defaults to depositor if not provided.</p>
        - in: query
          name: refundOnOrigin
          required: false
          description: >-
            For routes that include a destination swap (bridgeableToAny or anyToAny), destination refunds are the default behavior unless refundOnOrigin=true is explicitly set when calling the Swap API.

            Across determines refund behavior based on the route type (when refundOnOrigin is NOT explicitly set):

            1. B2B or A2B routes:
              - refundOnOrigin defaults to true
              - Refunds occur on the origin chain
              - Destination refunds do not apply here

            2. B2A or A2A routes
              - refundOnOrigin defaults to false
              - Refunds occur on the destination chain

            If an explicit refundOnOrigin value is provided, that value is always respected.

            If a refund occurs, the address that receives the refunded funds is determined using the following priority order: 1. refundAddress (if explicitly specified) 2. recipient (if specified) 3. depositor (fallback)

            This applies to both origin and destination refunds.
          schema:
            type: boolean
            default: true
          x-gitbook-description-html: >-
            <p>For routes that include a destination swap (bridgeableToAny or anyToAny), destination refunds are the default behavior unless refundOnOrigin=true is explicitly set when calling the Swap API.

            Across determines refund behavior based on the route type (when refundOnOrigin is NOT explicitly set):</p>

            <ol>

            <li>B2B or A2B routes:</li>

            </ol>

            <ul>

            <li>refundOnOrigin defaults to true</li>

            <li>Refunds occur on the origin chain</li>

            <li>Destination refunds do not apply here</li>

            </ul>

            <ol start="2">

            <li>B2A or A2A routes</li>

            </ol>

            <ul>

            <li>refundOnOrigin defaults to false</li>

            <li>Refunds occur on the destination chain</li>

            </ul>

            <p>If an explicit refundOnOrigin value is provided, that value is always respected.

            If a refund occurs, the address that receives the refunded funds is determined using the following priority order: 1. refundAddress (if explicitly specified) 2. recipient (if specified) 3. depositor (fallback)

            This applies to both origin and destination refunds.</p>
        - in: query
          name: slippage
          required: false
          description: >-
            Slippage tolerance percentage can be set to auto (default) or a numerical value. Numerical value must be between 0 and 1 representing corresponding percentage. So if you want slippage to be 0.5% , you need to pass 0.005 as the value here). If slippage is auto, the Swap API will select the best slippage intelligently and move ahead with the crosschain swap. If slippage is set to a numerical value, for example 0.01 (1% slippage), it divides this value equally for each leg. This means 0.5% slippage for origin and 0.5% slippage for destination.
          schema:
            type: string
            format: float | string
            default: auto
          x-gitbook-description-html: >-
            <p>Slippage tolerance percentage can be set to auto (default) or a numerical value. Numerical value must be between 0 and 1 representing corresponding percentage. So if you want slippage to be 0.5% , you need to pass 0.005 as the value here). If slippage is auto, the Swap API will select the best slippage intelligently and move ahead with the crosschain swap. If slippage is set to a numerical value, for example 0.01 (1% slippage), it divides this value equally for each leg. This means 0.5% slippage for origin and 0.5% slippage for destination.</p>
        - in: query
          name: skipOriginTxEstimation
          required: false
          description: >-
            Used to define whether you want to calculate the transaction details (swap) on origin chain. Defaults to false.
          schema:
            type: boolean
            default: true
          x-gitbook-description-html: >-
            <p>Used to define whether you want to calculate the transaction details (swap) on origin chain. Defaults to false.</p>
        - in: query
          name: strictTradeType
          required: false
          description: >-
            Used to define whether you want to strictly follow the defined tradeType.Defaults to true.
          schema:
            type: boolean
            default: true
          x-gitbook-description-html: >-
            <p>Used to define whether you want to strictly follow the defined tradeType.Defaults to true.</p>
        - in: query
          name: excludeSources
          required: false
          description: >-
            Used to define the sources you want to exclude from the crosschain swap action. Defaults to an empty array.
          schema:
            type: array
            items:
              type: string
            default: true
          x-gitbook-description-html: >-
            <p>Used to define the sources you want to exclude from the crosschain swap action. Defaults to an empty array.</p>
        - in: query
          name: includeSources
          required: false
          description: >-
            Used to define the sources you want to include from the crosschain swap action. Defaults to an empty array.
          schema:
            type: array
            items:
              type: string
            default: true
          x-gitbook-description-html: >-
            <p>Used to define the sources you want to include from the crosschain swap action. Defaults to an empty array.</p>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwapApprovalRequest'
            example:
              actions:
                - target: '0xaf88d065e77c8cC2239327C5EDb3A432268e5831'
                  functionSignature: function transfer(address to, uint256 value)
                  args:
                    - value: '0x718648C8c531F91b528A7757dD2bE813c3940608'
                      populateDynamically: false
                    - value: '0'
                      populateDynamically: true
                      balanceSourceToken: '0xaf88d065e77c8cC2239327C5EDb3A432268e5831'
                  value: '0'
                  isNativeTransfer: false
      responses:
        '200':
          description: Swap approval data returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  crossSwapType:
                    type: string
                    description: >
                      The `crossSwapType` determines how swaps are processed within the system.  

                      It controls:
                        - Which swap strategy to use (bridgeable tokens vs. any tokens)
                        - How to handle the swap flow (input/output token logic)
                        - Which quote-fetching functions to call
                        - How responses and errors are formatted
                    enum:
                      - bridgeableToBridgeable
                      - bridgeableToAny
                      - anyToBridgeable
                      - anyToAny
                    example: anyToBridgeable
                    x-enum-descriptions: >
                      - BRIDGEABLE_TO_BRIDGEABLE: Both input and output tokens are bridgeable

                      - BRIDGEABLE_TO_ANY: Input token is bridgeable, output token is any token

                      - ANY_TO_BRIDGEABLE: Input token is any token, output token is bridgeable

                      - ANY_TO_ANY: Both input and output tokens are any tokens (not bridgeable)
                    x-gitbook-description-html: >-
                      <p>The <code>crossSwapType</code> determines how swaps are processed within the system.<br>

                      It controls:</p>

                      <ul>

                      <li>Which swap strategy to use (bridgeable tokens vs. any tokens)</li>

                      <li>How to handle the swap flow (input/output token logic)</li>

                      <li>Which quote-fetching functions to call</li>

                      <li>How responses and errors are formatted</li>

                      </ul>
                  amountType:
                    type: string
                    description: Type of amount specification.
                    example: exactInput
                    x-gitbook-description-html: <p>Type of amount specification.</p>
                  approvalTxns:
                    type: array
                    description: >-
                      List of ERC-20 approval transactions required before submitting the deposit.
                    items:
                      type: object
                      description: Details for a single approval transaction.
                      properties:
                        chainId:
                          type: number
                          description: >-
                            Chain ID where the approval transaction must be submitted.
                          example: 10
                          x-gitbook-description-html: >-
                            <p>Chain ID where the approval transaction must be submitted.</p>
                        to:
                          type: string
                          description: >-
                            Spender contract address that needs the ERC-20 approval.
                          example: '0x0b2C639c533813f4Aa9D7837CAf62653d097Ff85'
                          x-gitbook-description-html: >-
                            <p>Spender contract address that needs the ERC-20 approval.</p>
                        data:
                          type: string
                          description: >-
                            Encoded calldata (typically approve(spender, amount)) for the approval transaction.
                          example: 0x095ea7b300000...ffffffffffffffffffffffffff
                          x-gitbook-description-html: >-
                            <p>Encoded calldata (typically approve(spender, amount)) for the approval transaction.</p>
                      x-gitbook-description-html: <p>Details for a single approval transaction.</p>
                    x-gitbook-description-html: >-
                      <p>List of ERC-20 approval transactions required before submitting the deposit.</p>
                  checks:
                    type: object
                    description: Contains data on required checks.
                    properties:
                      allowance:
                        type: object
                        description: Token allowance details.
                        properties:
                          token:
