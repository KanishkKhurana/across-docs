paths:
  /suggested-fees:
    get:
      x-codeSamples:
        - lang: bash
          label: Curl
          source: |
            curl -L \
              'https://app.across.to/api/suggested-fees?inputToken=0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2&outputToken=0x4200000000000000000000000000000000000006&originChainId=1&destinationChainId=10&amount=1000000000000000000'
      summary: Retrieve suggested fee quote for a deposit.
      description: >
        Returns suggested fees based on `inputToken`, `outputToken`, `originChainId`, `destinationChainId`, and `amount`. Also includes transfer limits of the system and data used to compute the fees.
      parameters:
        - name: inputToken
          in: query
          required: true
          schema:
            type: string
          examples:
            default:
              value: '0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2'
          description: >
            Address of token to bridge on the _origin_ chain. Must be used together with parameter `outputToken`. For ETH, use the wrapped address, like WETH.


            Note that the address provided must exist on the specified `originChainId` below.
          x-gitbook-description-html: >-
            <p>Address of token to bridge on the <em>origin</em> chain. Must be used together with parameter <code>outputToken</code>. For ETH, use the wrapped address, like WETH.</p>

            <p>Note that the address provided must exist on the specified <code>originChainId</code> below.</p>
        - name: outputToken
          in: query
          required: true
          schema:
            type: string
          examples:
            default:
              value: '0x4200000000000000000000000000000000000006'
          description: >
            Address of token to bridge on the _destination_ chain. Must be used together with parameter `inputToken`. For ETH, use the wrapped address, like WETH.


            Note that the address provided must exist on the specified `destinationChainId` below.
          x-gitbook-description-html: >-
            <p>Address of token to bridge on the <em>destination</em> chain. Must be used together with parameter <code>inputToken</code>. For ETH, use the wrapped address, like WETH.</p>

            <p>Note that the address provided must exist on the specified <code>destinationChainId</code> below.</p>
        - name: originChainId
          in: query
          required: true
          description: |
            Chain ID where the specified `inputToken` exists.
          schema:
            allOf:
              - $ref: '#/components/schemas/ChainId'
          examples:
            default:
              value: 1
          x-gitbook-description-html: <p>Chain ID where the specified <code>inputToken</code> exists.</p>
        - name: destinationChainId
          in: query
          required: true
          description: |
            The desired destination chain ID of the bridge transfer.
          schema:
            allOf:
              - $ref: '#/components/schemas/ChainId'
          examples:
            default:
              value: 10
          x-gitbook-description-html: <p>The desired destination chain ID of the bridge transfer.</p>
        - name: amount
          in: query
          required: true
          description: >
            Amount of the token to transfer.


            Note that this amount is in the native decimals of the token. So, for WETH, this would be the amount of human-readable WETH multiplied by 1e18. For USDC, you would multiply the number of human-readable USDC by 1e6.
          schema:
            type: integer
            minimum: 1
          examples:
            default:
              value: '1000000000000000000'
          x-gitbook-description-html: >-
            <p>Amount of the token to transfer.</p>

            <p>Note that this amount is in the native decimals of the token. So, for WETH, this would be the amount of human-readable WETH multiplied by 1e18. For USDC, you would multiply the number of human-readable USDC by 1e6.</p>
        - name: recipient
          in: query
          required: false
          description: >
            Recipient of the deposit. Can be an EOA or a contract. If this is an EOA and message is defined, then the API will throw a 4xx error.


            _Example_: 0xc186fA914353c44b2E33eBE05f21846F1048bEda
          schema:
            type: string
          x-gitbook-description-html: >-
            <p>Recipient of the deposit. Can be an EOA or a contract. If this is an EOA and message is defined, then the API will throw a 4xx error.</p>

            <p><em>Example</em>: 0xc186fA914353c44b2E33eBE05f21846F1048bEda</p>
        - name: message
          in: query
          required: false
          description: >
            Calldata passed to the `recipient` if `recipient` is a contract address.  This calldata is passed to the recipient via the recipient's handleV3AcrossMessage() public function.

            _Example:_ 0xABC123
          schema:
            type: string
          x-gitbook-description-html: >-
            <p>Calldata passed to the <code>recipient</code> if <code>recipient</code> is a contract address.  This calldata is passed to the recipient via the recipient's handleV3AcrossMessage() public function.

            <em>Example:</em> 0xABC123</p>
        - name: relayer
          in: query
          required: false
          description: >
            Optionally override the relayer address used to simulate the fillRelay() call that estimates the gas costs needed to fill a deposit. This simulation result impacts the returned suggested-fees. The reason to customize the EOA would be primarily if the recipientAddress is a contract and requires a certain relayer to submit the fill, or if one specific relayer has the necessary token balance to make the fill.


            _Example:_ 0x428AB2BA90Eba0a4Be7aF34C9Ac451ab061AC010
          schema:
            type: string
          x-gitbook-description-html: >-
            <p>Optionally override the relayer address used to simulate the fillRelay() call that estimates the gas costs needed to fill a deposit. This simulation result impacts the returned suggested-fees. The reason to customize the EOA would be primarily if the recipientAddress is a contract and requires a certain relayer to submit the fill, or if one specific relayer has the necessary token balance to make the fill.</p>

            <p><em>Example:</em> 0x428AB2BA90Eba0a4Be7aF34C9Ac451ab061AC010</p>
        - name: timestamp
          in: query
          required: false
          description: >
            The quote timestamp used to compute the LP fees. When bridging with across, the user only specifies the quote timestamp in their transaction. The relayer then determines the utilization at that timestamp to determine the user's fee. This timestamp must be close (within 10 minutes or so) to the current time on the chain where the user is depositing funds and it should be <= the current block timestamp on mainnet. This allows the user to know exactly what LP fee they will pay before sending the transaction. 


            If this value isn't provided in the request, the API will assume the latest block timestamp on mainnet.


            _Example:_ 1653547649
          schema:
            type: integer
          x-gitbook-description-html: >-
            <p>The quote timestamp used to compute the LP fees. When bridging with across, the user only specifies the quote timestamp in their transaction. The relayer then determines the utilization at that timestamp to determine the user's fee. This timestamp must be close (within 10 minutes or so) to the current time on the chain where the user is depositing funds and it should be &#x3C;= the current block timestamp on mainnet. This allows the user to know exactly what LP fee they will pay before sending the transaction.</p>

            <p>If this value isn't provided in the request, the API will assume the latest block timestamp on mainnet.</p>

            <p><em>Example:</em> 1653547649</p>
        - name: allowUnmatchedDecimals
          in: query
          required: false
          description: >
            Used to define whether you want to allow unmatched decimals between the input and output tokens. For tokens with mismatched decimals in the origin and destination chain the API will throw an error if this is not explicitly set to true. Defaults to false.
          schema:
            type: boolean
          examples:
            default:
              value: false
          x-gitbook-description-html: >-
            <p>Used to define whether you want to allow unmatched decimals between the input and output tokens. For tokens with mismatched decimals in the origin and destination chain the API will throw an error if this is not explicitly set to true. Defaults to false.</p>
