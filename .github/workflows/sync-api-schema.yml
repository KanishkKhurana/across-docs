name: Sync API Schema

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6 AM UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync API schema with live endpoints
        run: pnpm sync:api:update

      - name: Regenerate API docs from updated spec
        run: pnpm generate:api

      - name: Generate PR body from sync report
        id: report
        run: |
          if [ -f scripts/sync/last-sync-report.json ]; then
            BODY=$(node -e "
              const r = require('./scripts/sync/last-sync-report.json');
              const lines = ['## API Schema Sync Report', '', 'Generated: ' + r.timestamp, ''];
              for (const ep of r.endpoints) {
                lines.push('### ' + ep.name);
                if (ep.created) lines.push('**New schema created**');
                if (ep.error) { lines.push('Error: ' + ep.error); continue; }
                lines.push('- New fields: ' + ep.diff.added.length);
                lines.push('- Type changes (review): ' + ep.diff.typeChanges.length);
                lines.push('- Missing from response: ' + ep.diff.missing.length);
                if (ep.diff.added.length > 0) {
                  lines.push('', '**Added fields:**');
                  for (const a of ep.diff.added.slice(0, 15)) {
                    lines.push('- \`' + a.path + '\` (' + (a.schema?.type || 'unknown') + ')');
                  }
                  if (ep.diff.added.length > 15) lines.push('- ... and ' + (ep.diff.added.length - 15) + ' more');
                }
                if (ep.diff.typeChanges.length > 0) {
                  lines.push('', '**Type changes (NOT auto-applied):**');
                  for (const tc of ep.diff.typeChanges) {
                    lines.push('- \`' + tc.path + '\`: ' + tc.existingType + ' → ' + tc.inferredType);
                  }
                }
                lines.push('');
              }
              console.log(lines.join('\n'));
            ")
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "$BODY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "body=No sync report generated." >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto/sync-api-schema
          commit-message: 'chore: auto-sync API schema with live endpoints'
          title: 'chore: auto-sync API schema with live endpoints'
          body: |
            ${{ steps.report.outputs.body }}

            ---
            This PR was auto-generated by the API schema sync workflow.
            Please review the changes before merging.
          labels: automated,api-schema
          delete-branch: true
