name: Sync API Schema

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6 AM UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync API schema with live endpoints
        run: pnpm sync:api:update

      - name: Regenerate API docs from updated spec (local — uses synced YAML)
        run: pnpm generate:api:local

      - name: Read sync summary for PR body
        id: summary
        run: |
          if [ -f scripts/sync/last-sync-summary.md ]; then
            {
              echo "body<<ENDOFSUMMARY"
              cat scripts/sync/last-sync-summary.md
              echo ""
              echo "---"
              echo "This PR was auto-generated by the API schema sync workflow."
              echo "Please review auto-generated descriptions/examples and refine before merging."
              echo "ENDOFSUMMARY"
            } >> "$GITHUB_OUTPUT"
          else
            echo "body=No sync report generated." >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto/sync-api-schema
          commit-message: 'chore: auto-sync API schema with live endpoints'
          title: 'chore: auto-sync API schema with live endpoints'
          body: ${{ steps.summary.outputs.body }}
          labels: automated,api-schema
          delete-branch: true
